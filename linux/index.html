<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Server Command Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0d0f;
    --surface: #111518;
    --surface2: #161c20;
    --border: #1e2a30;
    --accent: #00e5a0;
    --accent2: #00b8d9;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --accent5: #a78bfa;
    --text: #e2eaed;
    --muted: #5a7080;
    --dim: #2a3840;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,13,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--accent);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .logo span { color: var(--muted); font-weight: 400; }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }
  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 38px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .count-badge {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .count-badge strong { color: var(--accent); }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* Sidebar */
  .sidebar {
    position: sticky;
    top: 80px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 10px;
    margin-bottom: 8px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    border: none;
    background: transparent;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }
  .cat-btn:hover { background: var(--surface); color: var(--text); }
  .cat-btn.active { background: var(--surface2); color: var(--text); }
  .cat-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-btn .badge {
    margin-left: auto;
    font-size: 0.65rem;
    background: var(--dim);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--muted);
  }
  .cat-btn.active .badge { background: var(--accent); color: var(--bg); }

  /* Main content */
  .main { display: flex; flex-direction: column; gap: 2.5rem; }

  .section {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .section-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* Command grid */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .cmd-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .cmd-card:hover { border-color: var(--dim); transform: translateY(-1px); }
  .cmd-card:hover::before { opacity: 1; }

  .cmd-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .cmd-code {
    font-size: 0.78rem;
    font-weight: 500;
    line-height: 1.5;
    word-break: break-all;
  }
  .cmd-copy {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cmd-copy:hover { border-color: var(--accent); color: var(--accent); }
  .cmd-copy.copied { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }

  .cmd-desc {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .highlight { color: var(--accent); background: rgba(0,229,160,0.1); border-radius: 2px; }

  /* Tags */
  .cmd-tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 0.58rem;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  /* No results */
  .no-results { display: none; text-align: center; padding: 3rem; color: var(--muted); }

  @media(max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { position: static; flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    ⬡ <span>linux</span>ref
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search commands, descriptions..." autocomplete="off">
  </div>
  <div class="count-badge">Showing <strong id="visible-count">200</strong> of 200 commands</div>
</header>

<div class="container">
  <nav class="sidebar">
    <div class="sidebar-title">Categories</div>
    <button class="cat-btn active" data-cat="all">
      <span class="dot" style="background:#666"></span> All Commands
      <span class="badge">200</span>
    </button>
    <button class="cat-btn" data-cat="system">
      <span class="dot" style="background:#00e5a0"></span> System Info
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="cpu">
      <span class="dot" style="background:#00b8d9"></span> CPU & Processes
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="memory">
      <span class="dot" style="background:#a78bfa"></span> Memory
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="disk">
      <span class="dot" style="background:#ffd166"></span> Disk & Storage
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="network">
      <span class="dot" style="background:#ff6b6b"></span> Network
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="logs">
      <span class="dot" style="background:#f97316"></span> Logs & Monitoring
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="security">
      <span class="dot" style="background:#ec4899"></span> Security
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="services">
      <span class="dot" style="background:#84cc16"></span> Services
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="files">
      <span class="dot" style="background:#14b8a6"></span> Files & Dirs
      <span class="badge">20</span>
    </button>
    <button class="cat-btn" data-cat="selinux">
      <span class="dot" style="background:#fb923c"></span> SELinux
      <span class="badge">20</span>
    </button>
  </nav>

  <div class="main" id="main"></div>
</div>

<script>
const CATS = {
  system:   { label: 'System Information',    icon: '🖥️',  color: '#00e5a0', sub: 'OS, kernel, hardware, uptime' },
  cpu:      { label: 'CPU & Processes',       icon: '⚙️',  color: '#00b8d9', sub: 'Load, processes, scheduling' },
  memory:   { label: 'Memory',               icon: '🧠',  color: '#a78bfa', sub: 'RAM, swap, OOM analysis' },
  disk:     { label: 'Disk & Storage',        icon: '💾',  color: '#ffd166', sub: 'Filesystem, I/O, partitions' },
  network:  { label: 'Network',              icon: '🌐',  color: '#ff6b6b', sub: 'Interfaces, ports, traffic, DNS' },
  logs:     { label: 'Logs & Monitoring',    icon: '📋',  color: '#f97316', sub: 'Journald, syslog, dmesg, auditd' },
  security: { label: 'Security',             icon: '🔐',  color: '#ec4899', sub: 'Users, permissions, firewall, SSH' },
  services: { label: 'Services & Systemd',   icon: '⚡',  color: '#84cc16', sub: 'Start, stop, enable, status' },
  files:    { label: 'Files & Directories',  icon: '📁',  color: '#14b8a6', sub: 'Find, permissions, ownership' },
  selinux:  { label: 'SELinux',              icon: '🛡️',  color: '#fb923c', sub: 'Contexts, policies, booleans, audit' },
};

const COMMANDS = [
  // ── SYSTEM (20) ──────────────────────────────────────────
  { cat:'system', cmd:'uname -a',                                         desc:'Show all kernel info: name, hostname, kernel version, machine type and OS', tags:['kernel'] },
  { cat:'system', cmd:'hostnamectl',                                       desc:'Show hostname, static/transient/pretty name, OS, kernel, architecture', tags:['hostname'] },
  { cat:'system', cmd:'cat /etc/os-release',                              desc:'Print OS name, version, ID, and distribution metadata from release file', tags:['os'] },
  { cat:'system', cmd:'uptime -p',                                         desc:'Human-readable uptime output: "up 3 days, 4 hours, 22 minutes"', tags:['uptime'] },
  { cat:'system', cmd:'timedatectl status',                                desc:'Show local time, timezone, NTP service state and synchronization status', tags:['time','ntp'] },
  { cat:'system', cmd:'lscpu',                                             desc:'Show CPU architecture, cores, threads, sockets, NUMA nodes, cache sizes', tags:['cpu','hardware'] },
  { cat:'system', cmd:'lshw -short',                                       desc:'Short hardware summary listing CPU, memory, disk, and network devices', tags:['hardware'] },
  { cat:'system', cmd:'dmidecode -t system',                               desc:'BIOS/DMI data: manufacturer, product name, serial number, UUID (needs root)', tags:['bios','hardware'] },
  { cat:'system', cmd:'cat /proc/cpuinfo | grep "model name" | head -1',  desc:'Display CPU model name from the kernel proc filesystem', tags:['cpu'] },
  { cat:'system', cmd:'cat /proc/meminfo | head -20',                     desc:'First 20 lines of raw memory information from the kernel', tags:['memory'] },
  { cat:'system', cmd:'nproc',                                             desc:'Print number of available processing units (logical cores)', tags:['cpu'] },
  { cat:'system', cmd:'last reboot | head -5',                            desc:'Show the 5 most recent system reboot events from wtmp log', tags:['uptime','reboot'] },
  { cat:'system', cmd:'lsmod',                                             desc:'List currently loaded kernel modules with size and dependencies', tags:['kernel','modules'] },
  { cat:'system', cmd:'modinfo <module>',                                  desc:'Show details about a kernel module: version, author, parameters', tags:['kernel','modules'] },
  { cat:'system', cmd:'sysctl -a 2>/dev/null | grep -i "vm\\|net\\|kernel" | head -30', desc:'Dump key kernel runtime parameters for VM, network, and core settings', tags:['kernel','tuning'] },
  { cat:'system', cmd:'cat /proc/version',                                 desc:'Show exact kernel version string including compiler and build info', tags:['kernel'] },
  { cat:'system', cmd:'arch',                                              desc:'Print machine hardware architecture (x86_64, aarch64, etc.)', tags:['hardware'] },
  { cat:'system', cmd:'localectl',                                         desc:'Show system locale, keyboard layout, and language settings', tags:['locale'] },
  { cat:'system', cmd:'hwinfo --short 2>/dev/null || lshw -businfo',      desc:'Short bus-level hardware info — CPU, disk, USB, PCI devices', tags:['hardware'] },
  { cat:'system', cmd:'cat /sys/class/dmi/id/product_name 2>/dev/null',   desc:'Print the server product/model name from DMI sysfs (no root needed)', tags:['hardware'] },

  // ── CPU & PROCESSES (20) ────────────────────────────────
  { cat:'cpu', cmd:'top -bn1 | head -25',                                  desc:'Snapshot of top processes sorted by CPU usage (non-interactive batch mode)', tags:['cpu','processes'] },
  { cat:'cpu', cmd:'htop',                                                  desc:'Interactive, color-coded process viewer with tree view and scroll support', tags:['cpu','processes','interactive'] },
  { cat:'cpu', cmd:'ps aux --sort=-%cpu | head -15',                       desc:'List top 15 processes sorted by CPU percentage descending', tags:['processes'] },
  { cat:'cpu', cmd:'ps aux --sort=-%mem | head -15',                       desc:'List top 15 processes sorted by memory percentage descending', tags:['processes','memory'] },
  { cat:'cpu', cmd:'cat /proc/loadavg',                                    desc:'Raw load averages: 1m, 5m, 15m, running/total tasks, and last PID', tags:['load'] },
  { cat:'cpu', cmd:'mpstat -P ALL 1 3',                                    desc:'Per-CPU core statistics sampled 3 times, 1 second apart (needs sysstat)', tags:['cpu','sysstat'] },
  { cat:'cpu', cmd:'pidstat -u 1 5',                                       desc:'Per-process CPU usage sampled 5 times every second (needs sysstat)', tags:['processes','sysstat'] },
  { cat:'cpu', cmd:'ps -eo pid,ppid,cmd,%cpu,%mem --sort=-%cpu | head -20', desc:'Custom process listing: PID, parent, command, CPU%, and MEM%', tags:['processes'] },
  { cat:'cpu', cmd:'pgrep -a -u root',                                     desc:'List all processes owned by the root user with their full arguments', tags:['processes','security'] },
  { cat:'cpu', cmd:'renice -n 10 -p <PID>',                               desc:'Lower scheduling priority (nice +10) of a running process by its PID', tags:['processes'] },
  { cat:'cpu', cmd:'kill -9 <PID>',                                        desc:'Force-kill a process immediately by sending the SIGKILL signal', tags:['processes'] },
  { cat:'cpu', cmd:'strace -p <PID> -e trace=all 2>&1 | head -30',        desc:'Trace system calls made by a running process (first 30 lines)', tags:['debug','processes'] },
  { cat:'cpu', cmd:'taskset -cp <PID>',                                    desc:'Show CPU affinity mask — which cores a process is allowed to run on', tags:['cpu','affinity'] },
  { cat:'cpu', cmd:'chrt -p <PID>',                                        desc:'Display scheduling policy and priority for a process (SCHED_OTHER, FIFO, RR)', tags:['scheduling'] },
  { cat:'cpu', cmd:'perf top -g',                                          desc:'Live kernel/userspace profiler showing hottest functions by CPU cycles', tags:['profiling','debug'] },
  { cat:'cpu', cmd:'sar -u 1 5',                                           desc:'CPU utilization report: user, system, iowait, idle every second for 5s', tags:['sysstat','cpu'] },
  { cat:'cpu', cmd:'ps -eo pid,lstart,cmd | grep <name>',                 desc:'Show exact start timestamp (date+time) of processes matching a name', tags:['processes'] },
  { cat:'cpu', cmd:'pstree -p',                                            desc:'Display process tree with PIDs — see parent-child process relationships', tags:['processes','tree'] },
  { cat:'cpu', cmd:'cat /proc/<PID>/status | grep -E "Vm|Threads|State"', desc:'Low-level status of a specific process from the proc filesystem', tags:['processes','debug'] },
  { cat:'cpu', cmd:'ionice -c 3 -p <PID>',                                desc:'Set process to idle I/O class — lowest disk priority, won\'t starve others', tags:['io','scheduling'] },

  // ── MEMORY (20) ─────────────────────────────────────────
  { cat:'memory', cmd:'free -h',                                           desc:'Human-readable summary of RAM and swap: used, free, available, buffers', tags:['ram','swap'] },
  { cat:'memory', cmd:'vmstat -s',                                         desc:'Detailed virtual memory statistics in a tabular one-shot format', tags:['ram','vmstat'] },
  { cat:'memory', cmd:'vmstat 1 5',                                        desc:'Live vmstat report sampled 5 times at 1-second intervals', tags:['ram','vmstat'] },
  { cat:'memory', cmd:'cat /proc/meminfo',                                 desc:'Full raw memory information from the kernel proc filesystem', tags:['ram'] },
  { cat:'memory', cmd:'slabtop -o',                                        desc:'Kernel slab cache snapshot — useful for spotting kernel memory leaks', tags:['kernel','memory'] },
  { cat:'memory', cmd:'sar -r 1 5',                                        desc:'Memory utilization report every second for 5 samples (needs sysstat)', tags:['sysstat','ram'] },
  { cat:'memory', cmd:'smem -r -k | head -15',                            desc:'Physical memory per-process with PSS/RSS/shared breakdown in KB', tags:['processes','ram'] },
  { cat:'memory', cmd:'cat /proc/*/status 2>/dev/null | grep -E "^(Name|VmRSS)" | paste - -', desc:'Pair each process name with its resident set size from proc', tags:['processes','ram'] },
  { cat:'memory', cmd:'dmesg | grep -i "oom"',                            desc:'Check kernel ring buffer for Out-Of-Memory killer invocation events', tags:['oom','kernel'] },
  { cat:'memory', cmd:'grep -i "out of memory" /var/log/syslog | tail -20', desc:'Check syslog for recent OOM kill messages and affected processes', tags:['oom','logs'] },
  { cat:'memory', cmd:'cat /proc/buddyinfo',                               desc:'Buddy allocator info showing memory fragmentation per zone and order', tags:['kernel','fragmentation'] },
  { cat:'memory', cmd:'cat /proc/slabinfo | sort -k3 -rn | head -20',     desc:'Raw slab allocator data sorted by number of active objects', tags:['kernel','slab'] },
  { cat:'memory', cmd:'numactl --hardware',                                desc:'Show NUMA topology: nodes, memory per node, distances between nodes', tags:['numa','hardware'] },
  { cat:'memory', cmd:'numastat -m',                                       desc:'Per-node memory usage statistics in a human-readable table', tags:['numa'] },
  { cat:'memory', cmd:'grep -E "HugePages|Hugepagesize" /proc/meminfo',   desc:'Check huge page configuration: total, free, and page size in use', tags:['hugepages','tuning'] },
  { cat:'memory', cmd:'valgrind --leak-check=full <program>',              desc:'Run a program under Valgrind to detect memory leaks and invalid accesses', tags:['debug','leaks'] },
  { cat:'memory', cmd:'sysctl vm.swappiness',                              desc:'Show current swappiness value (0=avoid swap, 100=aggressive swapping)', tags:['swap','tuning'] },
  { cat:'memory', cmd:'sysctl -w vm.swappiness=10',                       desc:'Set swappiness to 10 — reduce swap usage for server workloads', tags:['swap','tuning'] },
  { cat:'memory', cmd:'cat /proc/zoneinfo | grep -A5 "Node 0"',           desc:'Memory zone info for NUMA node 0: free pages, high/low watermarks', tags:['kernel','numa'] },
  { cat:'memory', cmd:'ps -eo pid,rss,vsz,comm --sort=-rss | head -15',   desc:'List top 15 processes by RSS (resident set size) in kilobytes', tags:['processes','ram'] },

  // ── DISK (20) ────────────────────────────────────────────
  { cat:'disk', cmd:'df -hT',                                              desc:'Disk usage per filesystem with type, size, used, available, and mount', tags:['filesystem'] },
  { cat:'disk', cmd:'df -i',                                               desc:'Inode usage per filesystem — exhausted inodes cause "no space" errors', tags:['filesystem','inodes'] },
  { cat:'disk', cmd:'du -sh /* 2>/dev/null | sort -rh | head -15',        desc:'Top 15 largest root-level directories sorted by size descending', tags:['usage'] },
  { cat:'disk', cmd:'du -sh /var/log/* | sort -rh | head -10',            desc:'Find the largest files inside /var/log directory', tags:['logs','usage'] },
  { cat:'disk', cmd:'lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT',          desc:'List block devices with size, type, filesystem type, and mount point', tags:['block'] },
  { cat:'disk', cmd:'blkid',                                               desc:'Print UUID, label, filesystem type for all discovered block devices', tags:['block','filesystem'] },
  { cat:'disk', cmd:'iostat -xz 1 3',                                     desc:'Extended disk I/O stats: util%, await, r/w MB/s sampled 3 times (sysstat)', tags:['io','sysstat'] },
  { cat:'disk', cmd:'iotop -o',                                            desc:'Live I/O usage per process — identify what is hammering the disk', tags:['io','processes'] },
  { cat:'disk', cmd:'hdparm -I /dev/sda | grep -E "Model|Serial|capacity"', desc:'Drive model, serial number, and capacity reported by the disk itself', tags:['hardware'] },
  { cat:'disk', cmd:'smartctl -a /dev/sda',                                desc:'Full SMART health report for a drive including error counts (needs smartmontools)', tags:['health','hardware'] },
  { cat:'disk', cmd:'findmnt',                                             desc:'Show all currently mounted filesystems in a readable tree view', tags:['filesystem','mount'] },
  { cat:'disk', cmd:'lsof +D /var/log | head -20',                        desc:'List open file handles in /var/log — find what process is writing logs', tags:['files','io'] },
  { cat:'disk', cmd:'find / -xdev -size +100M 2>/dev/null | sort -k5 -rn | head -10', desc:'Find files larger than 100MB on the current filesystem only', tags:['files','usage'] },
  { cat:'disk', cmd:'fstrim -av',                                          desc:'Issue TRIM to all mounted SSDs to reclaim space from deleted blocks', tags:['ssd','maintenance'] },
  { cat:'disk', cmd:'tune2fs -l /dev/sda1 | grep -E "count|state|time"', desc:'Show ext4 filesystem metadata: mount count, last check time, state', tags:['filesystem','ext4'] },

// ─── Render ───────────────────────────────────────────────────────────────────

let currentCat = 'all';
let searchTerm = '';

function highlight(text, term) {
  if (!term) return text;
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
}

function getTagStyle(cat) {
  const c = CATS[cat];
  return `background:${c.color}22; color:${c.color};`;
}

function render() {
  const main = document.getElementById('main');
  const cats = currentCat === 'all' ? Object.keys(CATS) : [currentCat];
  let totalVisible = 0;
  let html = '';

  cats.forEach(cat => {
    const cmds = COMMANDS.filter(c => {
      if (c.cat !== cat) return false;
      if (!searchTerm) return true;
      const q = searchTerm.toLowerCase();
      return c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) ||
             (c.tags && c.tags.some(t => t.includes(q)));
    });
    if (cmds.length === 0) return;
    totalVisible += cmds.length;

    const info = CATS[cat];
    html += `
      <div class="section" data-cat="${cat}">
        <div class="section-header">
          <div class="section-icon" style="background:${info.color}22;">${info.icon}</div>
          <div>
            <div class="section-title" style="color:${info.color}">${info.label}</div>
            <div class="section-sub">${info.sub} &mdash; ${cmds.length} command${cmds.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="cmd-grid">
          ${cmds.map(c => `
            <div class="cmd-card" style="--accent-cat:${info.color}" onclick="">
              <style>.cmd-card[style*="${info.color}"]::before { background: ${info.color}; }</style>
              <div class="cmd-top">
                <div class="cmd-code" style="color:${info.color}">${highlight(escHtml(c.cmd), searchTerm)}</div>
                <button class="cmd-copy" onclick="copyCmd(event, this, ${JSON.stringify(c.cmd)})">copy</button>
              </div>
              <div class="cmd-desc">${highlight(escHtml(c.desc), searchTerm)}</div>
              ${c.tags ? `<div class="cmd-tags">${c.tags.map(t=>`<span class="tag" style="${getTagStyle(cat)}">${t}</span>`).join('')}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  if (totalVisible === 0) {
    html = `<div class="no-results" style="display:block;color:var(--muted);padding:4rem;text-align:center;">
      No commands match "<strong style="color:var(--text)">${escHtml(searchTerm)}</strong>"<br>
      <span style="font-size:0.7rem;margin-top:0.5rem;display:block">Try a different keyword</span>
    </div>`;
  }

  main.innerHTML = html;
  document.getElementById('visible-count').textContent = totalVisible;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyCmd(e, btn, cmd) {
  e.stopPropagation();
  navigator.clipboard.writeText(cmd).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Category filter
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  if (searchTerm) {
    currentCat = 'all';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="all"]').classList.add('active');
  }
  render();
});

render();
</script>
